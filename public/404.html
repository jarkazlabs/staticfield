<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>staticfield</title>
  <script>
    // GitHub Pages SPA redirect trick
    // Converts /staticfield/field/b05 → /staticfield/?p=/field/b05
    var l = window.location;
    var base = '/staticfield';
    var path = l.pathname.slice(base.length) || '/';
    if (path !== '/' && path !== '/index.html') {
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        base + '/?p=' + encodeURIComponent(path + l.search) +
        (l.hash || '')
      );
    }
  </script>
</head>
<body></body>
</html>
